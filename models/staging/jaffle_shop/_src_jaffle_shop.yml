version: 2

sources:
  - name: jaffle_shop 
    schema: jaffle_shop
    database: raw 
    tables:
      - name: customers
        columns:
          - name: id # here we use id since that is the name of the column in the source
            data_tests:
              - unique 
              - not_null
      - name: orders

        config:
          freshness:
            warn_after:
              count: 20
              period: day
            error_after:
              count: 30
              period: day 
          loaded_at_field: _etl_loaded_at     
 
   