models:
  - name: stg_jaffle_shop__customers
    columns:
      - name: customer_id
        description: this is the unique identifier for the customers table i.e. primary key 
        data_tests: 
          - unique 
          - not_null

  - name: stg_jaffle_shop__orders
    columns: 
      - name: order_id
        description: unique identifier/primary key for orders table 
        data_tests: [unique, not_null]

      - name: status 
        description: orders status ("returned" or "completed")
        data_tests:
          - accepted_values: 
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending'] 
      - name: customer_id 
        description: foriegn key ref to customer_id in customer table 
        data_tests: 
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
             

